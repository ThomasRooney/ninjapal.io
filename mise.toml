# mise configuration for ninjapal.io development

[tools]
# Core development tools
bun = "latest"
node = "lts"  # Some tools may still require node
"ubi:DarthSim/overmind" = "v2.5.1"  # Process manager for development
supabase = "latest"  # Supabase CLI for local development
neonctl = "latest"  # Neon CLI for managing Neon Postgres
railway = "latest"  # Railway CLI — hosts zero-cache + device-sync poller

[env]
# Default environment variables for development
PORT = "3000"
VITE_PORT = "3000"

[tasks]
# Install dependencies
install = { run = "bun install", description = "Install npm dependencies" }

# Individual service tasks (used by overmind)
"dev:frontend" = { run = ".mise-tasks/dev/frontend.bash", description = "Start frontend development server" }
"dev:supabase" = { run = ".mise-tasks/dev/supabase.bash", description = "Start Supabase backend with proper cleanup" }
"dev:cache" = { run = ".mise-tasks/dev/cache.bash", description = "Start Zero cache server" }
"dev:email" = { run = ".mise-tasks/dev/email.bash", description = "Start React Email dev server" }

# Main development task
"dev:up" = { run = ".mise-tasks/dev/up.bash", description = "Start all services with overmind" }

# Convenience aliases
dev = { alias = "dev:up", description = "Start all services (alias for dev:up)" }

# Process management
stop = { run = "overmind quit", description = "Stop all services managed by overmind" }
restart = { run = "overmind restart", description = "Restart all services" }
ps = { run = "overmind ps", description = "Show status of all services" }

# Database tasks (passthrough to existing bun scripts)
"db:generate" = { run = "bun db:generate", description = "Generate Drizzle migration" }
"db:migrate" = { run = "bun db:migrate", description = "Apply migrations to database" }
"db:push" = { run = "bun db:push", description = "Push schema changes (dev only)" }
"db:seed" = { run = "bun db:seed", description = "Reset and seed database" }
"db:studio" = { run = "bun db:studio", description = "Open Drizzle Studio" }
"db:zero:generate" = { run = "bun db:zero:generate", description = "Generate Zero schema" }

# Supabase tasks (passthrough to existing bun scripts)
"supabase:start" = { run = "bun supabase:start", description = "Start local Supabase" }
"supabase:stop" = { run = "bun supabase:stop", description = "Stop local Supabase" }
"supabase:reset" = { run = "bun supabase:reset", description = "Reset Supabase database" }

# Code quality
check = { run = "bun check", description = "Run Biome linter/formatter" }
build = { run = "bun build", description = "Build for production" }
typecheck = { run = "npx tsc --noEmit", description = "Run TypeScript type checking" }

# Testing
test = { run = "bun test", description = "Run tests" }
"test:unit" = { run = "bun test:unit", description = "Run unit tests" }
"test:e2e" = { run = "bun test:e2e", description = "Run E2E tests" }

# Utility tasks
clean = { run = "rm -rf node_modules .turbo dist build", description = "Clean build artifacts" }
"clean:install" = { run = ["mise run clean", "mise run install"], description = "Clean and reinstall dependencies" }